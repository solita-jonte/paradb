apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: paradb
  labels:
    app: orchestrator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
      annotations:
        co.elastic.logs/enabled: "true"
        co.elastic.logs/json.keys_under_root: "true"
        co.elastic.logs/json.overwrite_keys: "true"
        co.elastic.logs/json.add_error_key: "true"
    spec:
      containers:
        - name: orchestrator
          image: paradb-orchestrator:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3356
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator
  namespace: paradb
spec:
  type: LoadBalancer
  selector:
    app: orchestrator
  ports:
    - port: 3356
      targetPort: 3356
